# Local/VM stack for Sunflower CFM v2.
# Phase 1: web + postgres(pgvector). Phase 7 adds caddy, redis, and the restic
# backup sidecar targeting Backblaze B2.

# Distinct project name → prefixes containers/network/volumes as
# "sunflower-cfm-v2_*" so this stack never collides with other Compose projects
# on the same machine. Override at runtime with `docker compose -p <name>`.
name: sunflower-cfm-v2

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sunflower-cfm-v2-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://cfm:cfm@postgres:5432/cfm
      JWT_SECRET: ${JWT_SECRET:-dev_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
    ports:
      # host:container — distinct host port to avoid clashing with v1 / other apps
      - "3100:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: sunflower-cfm-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cfm
      POSTGRES_PASSWORD: cfm
      POSTGRES_DB: cfm
    ports:
      # host:container — distinct host port so a local/other Postgres on 5432 is fine
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfm -d cfm"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for local dev/tests. Production uses
  # Backblaze B2 with the same S3 client — only the env vars change.
  minio:
    image: minio/minio:latest
    container_name: sunflower-cfm-v2-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cfm
      MINIO_ROOT_PASSWORD: cfm12345
    ports:
      # host:container — distinct host ports to avoid clashes
      - "59000:9000"
      - "59001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the uploads bucket, then exit.
  minio-init:
    image: minio/mc:latest
    container_name: sunflower-cfm-v2-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 cfm cfm12345 &&
      mc mb -p local/cfm-uploads && exit 0"
    restart: "no"

volumes:
  pgdata:
  miniodata:

name: v2 CI

on:
  push:
    branches: [main]
    paths:
      - "v2/**"
      - ".github/workflows/v2-ci.yml"
  pull_request:
    paths:
      - "v2/**"
      - ".github/workflows/v2-ci.yml"

defaults:
  run:
    working-directory: v2

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build must not require a live DB (health check is runtime-gated).
          DATABASE_URL: postgresql://cfm:cfm@localhost:5432/cfm
